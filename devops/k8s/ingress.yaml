apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agri-fi-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml"
    nginx.ingress.kubernetes.io/gzip-min-length: "1024"
    nginx.ingress.kubernetes.io/brotli-level: "4"
    nginx.ingress.kubernetes.io/brotli-types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - agri-fi.example.com
        - api.agri-fi.example.com
      secretName: agri-fi-tls-cert
  rules:
    - host: agri-fi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agri-fi-frontend
                port:
                  number: 80
    - host: api.agri-fi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agri-fi-backend
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@agri-fi.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
