<source>
  @type tail
  path /var/log/containers/*.log
  pos_file /fluentd/log/containers.log.pos
  tag kubernetes.*
  read_from_head true
  <parse>
    @type json
    time_key time
    time_type string
    time_format %Y-%m-%dT%H:%M:%S.%NZ
    keep_time_key true
  </parse>
</source>

<filter kubernetes.**>
  @type parser
  key_name log
  reserve_data true
  emit_invalid_record_to_error false
  <parse>
    @type json
  </parse>
</filter>

<match kubernetes.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  logstash_format true
  logstash_prefix agri-fi
  include_tag_key true
  tag_key fluentd_tag
  reconnect_on_error true
  reload_on_failure true
  request_timeout 30s
  <buffer>
    @type file
    path /fluentd/log/elasticsearch
    flush_interval 5s
    retry_forever true
  </buffer>
</match>
