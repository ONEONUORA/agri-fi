apiVersion: apps/v1
kind: Deployment
metadata:
  name: agri-fi-frontend
  labels:
    app: agri-fi-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agri-fi-frontend
  template:
    metadata:
      labels:
        app: agri-fi-frontend
    spec:
      containers:
        - name: frontend
          image: agri-fi/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: agri-fi-frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agri-fi-frontend-config
  labels:
    app: agri-fi-frontend
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://agri-fi-backend"
  BACKEND_URL: "http://agri-fi-backend"
