name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint, build, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agri
          POSTGRES_PASSWORD: agri
          POSTGRES_DB: agri_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://agri:agri@localhost:5432/agri_test
      JWT_SECRET: ci-test-secret
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_PLATFORM_SECRET: ${{ secrets.STELLAR_PLATFORM_SECRET_TESTNET }}
      STELLAR_INTEGRATION_TESTS: ${{ secrets.STELLAR_PLATFORM_SECRET_TESTNET != '' && 'true' || 'false' }}
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      RABBITMQ_URL: amqp://localhost:5672
      NOTIFICATIONS_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Check for unresolved merge conflicts
        run: |
          if grep -rn "<<<<<<< " --include="*.ts" --include="*.tsx" --include="*.json" .; then
            echo "Unresolved merge conflicts found!"
            exit 1
          fi
        working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Check Stellar testnet secret
        run: |
          if [ -z "${STELLAR_PLATFORM_SECRET}" ]; then
            echo "::notice title=Stellar integration tests disabled::STELLAR_PLATFORM_SECRET_TESTNET is not configured. Tests that require Stellar testnet access should skip when STELLAR_INTEGRATION_TESTS=false."
          else
            echo "Stellar testnet keypair configured for CI."
          fi

      - name: Verify lockfile
        run: npm ci --dry-run
        working-directory: backend

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint -- --max-warnings=0
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Run database migrations
        run: npm run migration:run
        working-directory: backend
        env:
          DATABASE_URL: postgres://agri:agri@localhost:5432/agri_test

      - name: Test
        run: npm test -- --forceExit --passWithNoTests --coverage
        working-directory: backend

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        if: ${{ always() && secrets.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=agri-fi-backend
            -Dsonar.projectName="Agri-Fi Backend"
            -Dsonar.sources=backend/src
            -Dsonar.tests=backend/src
            -Dsonar.test.inclusions=**/*.spec.ts,**/*.test.ts
            -Dsonar.typescript.lcov.reportPaths=backend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
