name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend:
    name: Frontend — lint, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for unresolved merge conflicts
        run: |
          if grep -rn "<<<<<<< " --include="*.ts" --include="*.tsx" --include="*.json" .; then
            echo "Unresolved merge conflicts found!"
            exit 1
          fi
        working-directory: frontend

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      # - name: Check ESLint config exists
      #   run: test -f .eslintrc.json || test -f eslint.config.mjs
      #   working-directory: frontend

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint
        run: pnpm run lint
        working-directory: frontend

      - name: Build
        run: pnpm run build
        working-directory: frontend
        env:
          # Stub URL for the build. Marketplace pages are force-dynamic, so the
          # build does not contact this URL — it is only baked into the client
          # bundle as a fallback default.
          NEXT_PUBLIC_API_URL: https://api.example.invalid
          BACKEND_URL: https://api.example.invalid
