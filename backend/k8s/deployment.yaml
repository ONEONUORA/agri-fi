apiVersion: apps/v1
kind: Deployment
metadata:
  name: agri-fi-backend
  labels:
    app: agri-fi-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agri-fi-backend
  template:
    metadata:
      labels:
        app: agri-fi-backend
    spec:
      containers:
        - name: backend
          image: agri-fi/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: agri-fi-backend-config
            - secretRef:
                name: agri-fi-backend-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agri-fi-backend-config
  labels:
    app: agri-fi-backend
data:
  NODE_ENV: "production"
  PORT: "3001"
  LOG_LEVEL: "info"
  LOG_PRETTY: "false"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "agric_onchain"
  RABBITMQ_URL: "amqp://rabbitmq:5672"
  STELLAR_NETWORK: "testnet"
  STELLAR_HORIZON_URL: "https://horizon-testnet.stellar.org"
  ALLOWED_ORIGINS: "http://agri-fi-frontend"
